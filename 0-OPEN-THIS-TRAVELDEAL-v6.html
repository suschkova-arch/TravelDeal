<!doctype html>
<html lang="ru">

        gap: 12px;
        padding: 12px 16px;

        border-bottom: 1px solid rgba(255,255,255,0.12);

        font-weight: 700;
        color: #c4b5fd;
      }

        opacity: 0.8;
        font-size: 13px;

      iframe {

        height: 100%;
        border: 0;
        margin-top: 58px;
