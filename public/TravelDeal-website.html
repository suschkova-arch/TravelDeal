    const countries = ['Все',...new Set(hotelsDB.map(h=>h.country))];

    let filtered = hotelsDB.filter(h=>{
        if(country!=='Все'&&h.country!==country) return false;
        if(starFilter>0&&h.stars!==starFilter) return false;
        return true;
    });
    
    if(sort==='cheapest') filtered.sort((a,b)=>Math.min(...a.partners.map(p=>p.price))-Math.min(...b.partners.map(p=>p.price)));
    else if(sort==='rating') filtered.sort((a,b)=>b.rating-a.rating);

    const getMaxPrice=p=>Math.max(...p.partners.map(x=>x.price));

// Статистика
const StatsSection = () => {
    const [started,setStarted]=useState(false);
    const ref=useRef(null);
    useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setStarted(true);o.disconnect()}},{threshold:.3});if(ref.current)o.observe(ref.current);return()=>o.disconnect()},[]);
    
    const StatCard=({target,label,suffix,icon,color})=>{
        const [count,setCount]=useState(0);
        useEffect(()=>{if(!started)return;let s=0;const step=target/(2000/16);const t=setInterval(()=>{s+=step;if(s>=target){setCount(target);clearInterval(t)}else setCount(Math.floor(s))},16);return()=>clearInterval(t)},[target,started]);
        return (
            <div className="glass-hover" style={{background:'var(--glass)',border:'1px solid var(--border)',borderRadius:20,padding:'32px 24px',textAlign:'center'}}>
                <div style={{fontSize:40,marginBottom:12}}>{icon}</div>
                <div style={{fontSize:'clamp(28px,5vw,48px)',fontWeight:900,color,marginBottom:8}}>{count>=1e6?`${(count/1e6).toFixed(1)}M`:count>=1e3?`${(count/1e3).toFixed(0)}K`:count}{suffix}</div>
                <div style={{color:'var(--text2)',fontSize:14}}>{label}</div>
            </div>
        );
    };
    
    return (
        <section ref={ref} className="section" style={{background:'var(--bg2)'}}>
            <div className="container" style={{maxWidth:1000}}>
                <div style={{textAlign:'center',marginBottom:48}}>
                    <h2 style={{fontSize:'clamp(28px,4vw,48px)',fontWeight:800,marginBottom:12}}>TravelDeal в цифрах</h2>
                </div>
                <div className="grid-2" style={{gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))'}}>
                    <StatCard target={2400000} label="Довольных путешественников" suffix="+" icon="👥" color="var(--purple)"/>
                    <StatCard target={60} label="Максимальная экономия" suffix="%" icon="💰" color="var(--green)"/>
                    <StatCard target={500} label="Направлений" suffix="+" icon="🌍" color="var(--gold)"/>
                    <StatCard target={8} label="Партнёров" suffix="" icon="🤝" color="#a78bfa"/>
                </div>
            </div>
        </section>
    );
};

// 🔴 LIVE API — Реальные цены с сервера
// ============================================================
(async function loadLivePrices() {
    const API_BASE = window.location.origin;
    const statusEl = document.getElementById('api-status');
    
    try {
        // Проверяем, доступен ли API
        const health = await fetch(API_BASE + '/api/health', { signal: AbortSignal.timeout(3000) });
        if (!health.ok) throw new Error('API недоступен');
        
        const healthData = await health.json();
        console.log('✅ API доступен:', healthData);
        if (statusEl) statusEl.innerHTML = '<span style="color:#34d399;font-size:11px">🟢 LIVE цены</span>';
        
        // Загружаем реальные отели для популярных городов
        const cities = ['dubai', 'paris', 'bali', 'tokyo', 'barcelona', 'maldives'];
        const hotelPromises = cities.map(city => 
            fetch(`${API_BASE}/api/hotels?city=${city}&adults=2`)
                .then(r => r.json())
                .catch(() => ({ hotels: [] }))
        );
        
        const flightPromises = cities.map(city =>
            fetch(`${API_BASE}/api/flights?from=Moscow&to=${city}&adults=1`)
                .then(r => r.json())
                .catch(() => ({ flights: [] }))
        );
        
        const [hotelResults, flightResults] = await Promise.all([
            Promise.all(hotelPromises),
            Promise.all(flightPromises),
        ]);
        
        const allHotels = hotelResults.flatMap(r => r.hotels || []);
        const allFlights = flightResults.flatMap(r => r.flights || []);
        
        console.log(`🏨 Загружено отелей: ${allHotels.length} | ✈️ Рейсов: ${allFlights.length}`);
        console.log('💰 Реальные цены с Amadeus API (2026)');
        
        // Обновляем данные для отелей
        if (allHotels.length > 0) {
            allHotels.forEach(h => {
                const idx = hotelsDB.findIndex(x => 
                    x.name.toLowerCase().includes(h.name?.toLowerCase()?.split(' ')[0]) ||
                    x.city.toLowerCase() === h.city?.toLowerCase()
                );
                if (idx >= 0 && h.priceRUB) {
                    hotelsDB[idx].livePrice = h.priceRUB;
                    hotelsDB[idx].livePriceUSD = h.price;
                    hotelsDB[idx].partners[0].price = h.priceRUB;
                    hotelsDB[idx].partners[0].name = 'Amadeus LIVE';
                }
            });
        }
        
        // Обновляем данные для рейсов
        if (allFlights.length > 0) {
            allFlights.forEach(f => {
                const idx = flightsDB.findIndex(x => 
                    x.toCode === f.to || x.fromCode === f.from
                );
                if (idx >= 0 && f.price) {
                    flightsDB[idx].livePrice = f.price;
                    flightsDB[idx].partners[0].price = f.price;
                    flightsDB[idx].partners[0].airline = f.airlineName || f.airline;
                    flightsDB[idx].partners[0].name = 'Amadeus LIVE';
                }
            });
        }
        
        // Перерендерим с новыми ценами
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
        
    } catch (err) {
        console.log('⚠️ API недоступен, используем кэшированные цены');
        if (statusEl) statusEl.innerHTML = '<span style="color:#f59e0b;font-size:11px">🟡 Кэш цены</span>';
    }
})();
