<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelDeal — запуск сайта</title>
  <!-- Автоматический переход на основной сайт (index.html лежит в той же папке) -->
  <meta http-equiv="refresh" content="0; url=./index.html">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1e;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #fff;
    }
    .box { text-align: center; }
    .logo {
      width: 64px; height: 64px; margin: 0 auto 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    a { color: #a78bfa; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">✈️</div>
    <h1>TravelDeal</h1>
    <p>Открываем сайт…</p>
    <p>Если переход не сработал — <a href="./index.html">нажмите сюда</a><br>
    (файл <b>index.html</b> должен лежать в той же папке)</p>
  </div>
</body>
</html>
